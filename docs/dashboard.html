<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Dashboard — Money Room</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;--text:#c8c8d0;--dim:#6b6b7b;--accent:#00e5ff;--green:#00e676;--orange:#ff9100;--red:#ff1744;--purple:#d500f9}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:20px}
.page-header{padding:40px 0 20px;border-bottom:1px solid var(--border);margin-bottom:30px}
.page-header h1{font-size:1.8rem;font-weight:600;color:#fff}
.page-header h1 span{color:var(--accent)}
.page-header p{color:var(--dim);font-size:0.85rem;margin-top:6px;font-family:'JetBrains Mono',monospace}
.summary-row{display:flex;gap:16px;margin-bottom:30px;flex-wrap:wrap}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;flex:1;min-width:160px;text-align:center}
.summary-card .num{font-size:2.2rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.summary-card .label{font-size:0.8rem;color:var(--dim);margin-top:4px}
.summary-card .num.green{color:var(--green)}
.summary-card .num.red{color:var(--red)}
.summary-card .num.accent{color:var(--accent)}
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--dim);cursor:pointer;font-size:0.8rem;transition:all .2s}
.filter-btn:hover{background:var(--border);color:var(--text)}
.filter-btn.active{background:rgba(0,229,255,0.12);border-color:var(--accent);color:var(--accent)}
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:12px;overflow:hidden}
th{text-align:left;padding:12px 16px;border-bottom:2px solid var(--accent);color:var(--accent);font-weight:500;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px}
td{padding:10px 16px;border-bottom:1px solid var(--border);font-size:0.85rem}
tr:hover{background:rgba(0,229,255,0.03)}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:0.7rem;font-weight:600}
.badge-ok{background:rgba(0,230,118,0.15);color:var(--green)}
.badge-stale{background:rgba(255,145,0,0.15);color:var(--orange)}
.badge-missing{background:rgba(255,23,68,0.15);color:var(--red)}
.badge-collector{background:rgba(0,229,255,0.1);color:var(--accent)}
.badge-engine{background:rgba(213,0,249,0.1);color:var(--purple)}
.badge-data{background:rgba(0,230,118,0.1);color:var(--green)}
.age-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.age-dot.ok{background:var(--green)}
.age-dot.stale{background:var(--orange)}
.age-dot.missing{background:var(--red)}
.mono{font-family:'JetBrains Mono',monospace;font-size:0.8rem}
.empty{text-align:center;padding:40px;color:var(--dim)}
.error-state{text-align:center;padding:40px;color:var(--red)}
#lastUpdated{color:var(--dim);font-size:0.75rem;margin-top:12px;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>

<nav>
  <div class="container">
    <a href="." class="logo"><span class="dot"></span> Money <span>Room</span></a>
    <div class="nav-links">
      <a href=".">Live</a>
      <a href="dashboard.html" class="active">Pipeline</a>
      <a href="data-sources.html">Sources</a>
      <a href="pricing.html">Pricing</a>
      <a href="register.html" style="background:transparent;color:var(--accent);border:1px solid var(--accent);box-shadow:none;padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none">Get Key</a>
      <a href="https://github.com/waefrebeorn/money-room">GitHub</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>🔬 Pipeline <span>Health</span></h1>
    <p>Real-time status of all collectors, engines, and data sources</p>
  </div>
</div>

<section>
  <div class="container">
    <div class="summary-row" id="summaryRow">
      <div class="summary-card"><div class="num accent" id="sumTotal">—</div><div class="label">Components</div></div>
      <div class="summary-card"><div class="num green" id="sumHealthy">—</div><div class="label">Healthy</div></div>
      <div class="summary-card"><div class="num red" id="sumUnhealthy">—</div><div class="label">Unhealthy</div></div>
      <div class="summary-card"><div class="num accent" id="sumGenomes">—</div><div class="label">Trained Genomes</div></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-filter="collector" onclick="setFilter('collector')">Collectors</button>
      <button class="filter-btn" data-filter="engine" onclick="setFilter('engine')">Engine</button>
      <button class="filter-btn" data-filter="data" onclick="setFilter('data')">Data Sources</button>
      <button class="filter-btn" data-filter="unhealthy" onclick="setFilter('unhealthy')">⚠ Unhealthy</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Component</th>
          <th>Category</th>
          <th>Status</th>
          <th>Age</th>
          <th>Schedule</th>
          <th>Size</th>
        </tr>
      </thead>
      <tbody id="pipelineBody">
        <tr><td colspan="6" class="empty">Loading pipeline data...</td></tr>
      </tbody>
    </table>

    <p id="lastUpdated"></p>
  </div>
</section>

<script>
let currentFilter = 'all';
let data = null;

function fmtAge(secs) {
  if (secs < 0) return '—';
  if (secs < 60) return secs + 's';
  if (secs < 3600) return Math.floor(secs/60) + 'm ' + (secs%60) + 's';
  if (secs < 86400) return Math.floor(secs/3600) + 'h ' + Math.floor((secs%3600)/60) + 'm';
  return Math.floor(secs/86400) + 'd ' + Math.floor((secs%86400)/3600) + 'h';
}

function fmtBytes(b) {
  if (!b || b < 0) return '—';
  if (b < 1024) return b + 'B';
  if (b < 1048576) return (b/1024).toFixed(1) + 'KB';
  return (b/1048576).toFixed(1) + 'MB';
}

function statusClass(status) {
  if (status === 'ok') return 'badge-ok';
  if (status === 'stale') return 'badge-stale';
  return 'badge-missing';
}

function dotClass(status) {
  if (status === 'ok') return 'age-dot ok';
  if (status === 'stale') return 'age-dot stale';
  return 'age-dot missing';
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-filter="${f}"]`).classList.add('active');
  render();
}

function render() {
  if (!data) return;
  const s = data.summary;
  document.getElementById('sumTotal').textContent = s.total;
  document.getElementById('sumHealthy').textContent = s.healthy;
  document.getElementById('sumUnhealthy').textContent = s.unhealthy;
  document.getElementById('sumGenomes').textContent = s.genome_count || '—';

  const items = data.components;
  const filtered = currentFilter === 'all' ? items :
    currentFilter === 'unhealthy' ? items.filter(c => !c.healthy) :
    items.filter(c => c.category === currentFilter);

  const tbody = document.getElementById('pipelineBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">No components match this filter</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(c => `
    <tr>
      <td><strong>${c.name}</strong></td>
      <td><span class="badge badge-${c.category}">${c.category}</span></td>
      <td><span class="badge ${statusClass(c.status)}">${c.status}</span></td>
      <td class="mono"><span class="${dotClass(c.status)}"></span>${fmtAge(c.age_seconds)}</td>
      <td style="color:var(--dim);font-size:0.8rem">${c.schedule || '—'}</td>
      <td class="mono" style="color:var(--dim)">${fmtBytes(c.file_size)}</td>
    </tr>
  `).join('');

  const ts = data.generated_at;
  if (ts) {
    const d = new Date(ts * 1000);
    document.getElementById('lastUpdated').textContent =
      'Updated: ' + d.toLocaleString() + '  •  Auto-refreshes every 30s';
  }
}

async function load() {
  try {
    const resp = await fetch('data/pipeline_status.json?_=' + Date.now());
    data = await resp.json();
    render();
  } catch(e) {
    document.getElementById('pipelineBody').innerHTML =
      '<tr><td colspan="6" class="error-state">⚠ Cannot connect to pipeline monitor. Run pipeline_monitor first.</td></tr>';
  }
}

load();
setInterval(load, 30000);
</script>

</body>
</html>
